<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>笔吧购机助手 - 笔记本电脑选购指南</title>
<meta name="theme-color" content="#6366F1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="笔吧助手">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ========== Design System v3.0 ========== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  /* Core Palette — Aurora Light */
  --bg:#F7F8FC;--bg2:#FFFFFF;--bg3:#EEF0F6;--bg4:#E4E7F0;
  --accent:#6366F1;--accent-light:#818CF8;--accent-dim:rgba(99,102,241,.08);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.06);
  --red:#EF4444;--red-dim:rgba(239,68,68,.06);
  --orange:#F59E0B;--orange-dim:rgba(245,158,11,.06);
  --purple:#A855F7;--purple-dim:rgba(168,85,247,.06);
  --cyan:#06B6D4;--cyan-dim:rgba(6,182,212,.06);

  /* Text Scale */
  --text:#1E1B4B;--text2:#4B5563;--text3:#6B7280;--text-muted:#9CA3AF;

  /* Borders & Surfaces */
  --border:rgba(99,102,241,.12);--border-hover:rgba(99,102,241,.25);
  --glass:rgba(255,255,255,.82);--glass-border:rgba(99,102,241,.1);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  --shadow-sm:0 1px 3px rgba(99,102,241,.06);
  --shadow-md:0 4px 20px rgba(99,102,241,.08);
  --shadow-lg:0 8px 40px rgba(99,102,241,.12);
  --shadow-glow:0 0 30px rgba(99,102,241,.12);

  /* Layout */
  --header-h:56px;--tabs-h:44px;--top-total:calc(var(--header-h) + var(--tabs-h));
  --content-pad:20px;

  /* Typography */
  --font-sans:'Noto Sans SC',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-mono:'JetBrains Mono',Consolas,'Courier New',monospace;

  /* Motion */
  --ease-out-expo:cubic-bezier(.16,1,.3,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --duration-fast:.15s;--duration-normal:.25s;--duration-slow:.4s;
}

body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7;-webkit-font-smoothing:antialiased;overflow:hidden}
a{color:var(--accent);text-decoration:none;transition:color var(--duration-fast)}a:hover{color:#4F46E5}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:10px}::-webkit-scrollbar-thumb:hover{background:#94A3B8}
::selection{background:var(--accent);color:#fff}

/* ========== Header ========== */
.header{background:rgba(255,255,255,.88);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100;height:var(--header-h);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%)}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;box-shadow:0 0 20px rgba(99,102,241,.25);transition:transform var(--duration-normal) var(--ease-spring)}
.header-logo:hover{transform:scale(1.08) rotate(-3deg)}
.header-title{font-size:17px;font-weight:700;letter-spacing:-.3px;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:11px;color:var(--text3);margin-top:1px;letter-spacing:.2px}
.header-right{display:flex;gap:10px;align-items:center}

/* ========== Buttons ========== */
.btn{padding:9px 18px;border:none;border-radius:var(--radius-xs);cursor:pointer;font-size:13px;font-weight:600;transition:all var(--duration-normal) var(--ease-out-expo);display:inline-flex;align-items:center;gap:6px;position:relative;overflow:hidden;font-family:var(--font-sans)}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);opacity:0;transition:opacity var(--duration-fast)}
.btn:hover::after{opacity:1}
.btn:active{transform:scale(.97)}
.btn-accent{background:linear-gradient(135deg,var(--accent),#4F46E5);color:#fff;box-shadow:0 2px 12px rgba(99,102,241,.25)}.btn-accent:hover{box-shadow:0 4px 20px rgba(99,102,241,.35);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-blue{background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff;box-shadow:0 2px 12px rgba(59,130,246,.2)}

/* ========== Tabs ========== */
.tabs{display:flex;background:rgba(255,255,255,.88);border-bottom:1px solid var(--border);overflow-x:auto;padding:0 16px;gap:4px;position:fixed;top:var(--header-h);left:0;right:0;z-index:99;height:var(--tabs-h);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);align-items:center}
.tab{padding:8px 20px;cursor:pointer;color:var(--text3);font-size:13px;font-weight:500;border:none;background:none;border-radius:var(--radius-xs);transition:all var(--duration-normal) var(--ease-out-expo);white-space:nowrap;display:flex;align-items:center;gap:7px;user-select:none;position:relative}
.tab:hover{color:var(--text2);background:var(--accent-dim)}
.tab.active{color:#fff;background:linear-gradient(135deg,var(--accent),#4F46E5);font-weight:600;border:none;box-shadow:0 2px 10px rgba(99,102,241,.25)}
.tab-icon{font-size:15px;transition:transform var(--duration-normal) var(--ease-spring)}
.tab:hover .tab-icon{transform:scale(1.15)}
.tab.active .tab-icon{transform:scale(1.1)}

/* ========== Content ========== */
.main{max-width:1200px;margin:0 auto;padding:0 20px}
.tab-content{display:none;margin-top:var(--top-total);height:calc(100vh - var(--top-total));overflow-y:auto;padding:16px var(--content-pad) 0}.tab-content.active{display:block}

/* ========== Cards - Base ========== */
.card{background:var(--bg2);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;transition:all var(--duration-normal) var(--ease-out-expo);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card:hover{border-color:var(--border-hover);box-shadow:0 4px 20px rgba(99,102,241,.1);transform:translateY(-2px)}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* ========== Chat ========== */
.chat-container{display:flex;flex-direction:column;height:100%;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:8px 4px 16px;display:flex;flex-direction:column;gap:16px;min-height:0;scroll-behavior:smooth}
.msg{display:flex;gap:14px;max-width:88%;animation:msgIn .4s var(--ease-out-expo)}
.msg-user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:var(--shadow-sm)}
.msg-ai .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff}
.msg-user .msg-avatar{background:var(--bg3);color:var(--text2)}
.msg-bubble{padding:14px 18px;border-radius:var(--radius);font-size:14px;line-height:1.8;word-break:break-word;letter-spacing:.1px}
.msg-ai .msg-bubble{background:var(--bg2);border:1px solid rgba(99,102,241,.12);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.msg-user .msg-bubble{background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(168,85,247,.06));border:1px solid rgba(99,102,241,.2)}
.msg-bubble strong{color:var(--accent);font-weight:600}
.msg-bubble code{background:var(--bg3);padding:2px 7px;border-radius:4px;font-size:13px;color:var(--orange);font-family:var(--font-mono)}

/* Chat Input */
.chat-input-area{padding:10px 0 12px;background:transparent;display:flex;flex-direction:column;flex-shrink:0}
.chat-input-row{display:flex;gap:10px;align-items:flex-end;background:var(--bg2);border:1px solid rgba(99,102,241,.15);border-radius:var(--radius);padding:6px 6px 6px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:border-color var(--duration-fast),box-shadow var(--duration-fast)}
.chat-input-row:focus-within{border-color:rgba(99,102,241,.4);box-shadow:0 0 0 3px rgba(99,102,241,.08)}
.chat-input{flex:1;background:none;border:none;padding:10px 0;color:var(--text);font-size:14px;resize:none;min-height:38px;max-height:50vh;font-family:var(--font-sans);line-height:1.5}
.chat-input:focus{outline:none}
.chat-input::placeholder{color:var(--text-muted)}
.chat-resize-handle{height:8px;display:flex;align-items:center;justify-content:center;cursor:row-resize;opacity:0;transition:opacity var(--duration-normal);user-select:none;-webkit-user-select:none}
.chat-resize-handle:hover,.chat-resize-handle.active{opacity:1}
.chat-resize-handle::after{content:'';width:36px;height:2.5px;border-radius:2px;background:var(--text-muted)}
.chat-resize-handle.top-handle{margin-top:0;margin-bottom:4px}

/* Welcome */
.chat-welcome{text-align:center;padding:40px 28px 32px;margin:16px 8px 8px;background:var(--bg2);border:1px solid rgba(99,102,241,.12);border-radius:var(--radius);color:var(--text2);animation:fadeUp .6s var(--ease-out-expo);box-shadow:0 4px 24px rgba(99,102,241,.06)}
.chat-welcome h2{font-size:24px;font-weight:700;margin-bottom:8px;color:var(--text);letter-spacing:-.5px}
.chat-welcome p{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.8}
.quick-tags{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.quick-tag{padding:9px 18px;background:var(--bg2);border:1px solid rgba(99,102,241,.15);border-radius:24px;cursor:pointer;font-size:13px;color:var(--text2);transition:all var(--duration-normal) var(--ease-out-expo);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.quick-tag:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);transform:translateY(-2px);box-shadow:0 4px 16px rgba(99,102,241,.12)}
.typing-dots{display:inline-flex;gap:5px;padding:6px 0}
.typing-dots span{width:8px;height:8px;background:var(--text3);border-radius:50%;animation:blink 1.4s infinite both}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}

/* ========== Modal ========== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid rgba(99,102,241,.12);border-radius:var(--radius);padding:32px;width:90%;max-width:460px;box-shadow:var(--shadow-lg);animation:modalIn .3s var(--ease-out-expo)}
.modal h3{font-size:18px;margin-bottom:16px;font-weight:700}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xs);padding:11px 14px;color:var(--text);font-size:14px;margin-bottom:14px;transition:border-color var(--duration-fast)}
.modal input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.modal-hint{font-size:12px;color:var(--text3);margin-bottom:18px;line-height:1.7}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}

/* ========== Knowledge Base ========== */
.kb-sidebar{display:grid;grid-template-columns:200px 1fr;gap:16px;height:100%}
@media(max-width:768px){.kb-sidebar{grid-template-columns:1fr}}
.kb-nav{background:var(--bg2);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius);padding:10px 8px;overflow-y:auto;height:calc(100vh - var(--top-total) - 32px);box-shadow:0 1px 4px rgba(0,0,0,.03)}
@media(max-width:768px){.kb-nav{height:auto;max-height:200px}}
.kb-nav-item{padding:8px 12px;border-radius:var(--radius-xs);cursor:pointer;font-size:13px;color:var(--text2);transition:all var(--duration-fast);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.kb-nav-item:hover{background:var(--accent-dim);color:var(--text)}
.kb-nav-item.active{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(168,85,247,.06));color:var(--accent);font-weight:600;box-shadow:inset 0 0 0 1px rgba(99,102,241,.15)}
.kb-nav-group{font-size:10px;color:var(--text-muted);text-transform:uppercase;padding:10px 12px 4px;font-weight:700;letter-spacing:1.5px;cursor:pointer;display:flex;align-items:center;gap:5px;user-select:none}
.kb-nav-group::before{content:'';display:inline-block;width:0;height:0;border-left:4px solid var(--text-muted);border-top:3px solid transparent;border-bottom:3px solid transparent;transition:transform var(--duration-normal);margin-right:2px}
.kb-nav-group:hover{color:var(--text3)}
.kb-nav-group.collapsed::before{transform:rotate(-90deg)}
.kb-nav-group + .kb-nav-item,
.kb-nav-group + .kb-nav-item + .kb-nav-item,
.kb-nav-group + .kb-nav-item + .kb-nav-item + .kb-nav-item{transition:all var(--duration-normal) var(--ease-out-expo)}
.kb-content{overflow-y:auto;height:calc(100vh - var(--top-total) - 32px);padding-bottom:20px}
@media(max-width:768px){.kb-content{height:auto;max-height:none}}
.kb-search{width:100%;background:var(--bg);border:1px solid rgba(99,102,241,.12);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:13px;margin-bottom:14px;transition:all var(--duration-fast);box-shadow:inset 0 1px 2px rgba(0,0,0,.04)}
.kb-search:focus{outline:none;border-color:rgba(99,102,241,.3);box-shadow:0 0 0 3px rgba(99,102,241,.08)}
.kb-search::placeholder{color:var(--text-muted)}

/* QA Cards */
.qa-card{background:var(--bg2);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;transition:all var(--duration-normal) var(--ease-out-expo);box-shadow:0 1px 4px rgba(0,0,0,.03)}
.qa-card:hover{border-color:var(--border-hover);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.qa-q{font-weight:700;font-size:14px;color:var(--accent);margin-bottom:8px;display:flex;gap:8px;align-items:flex-start}
.qa-q::before{content:"Q";background:linear-gradient(135deg,var(--accent),#4F46E5);color:#fff;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:800;flex-shrink:0;letter-spacing:.5px}
.qa-a{font-size:13px;color:var(--text2);line-height:1.8;white-space:pre-line;padding-left:26px}

/* Blacklist Cards */
.blacklist-card{border-color:rgba(239,68,68,.15);background:linear-gradient(135deg,rgba(239,68,68,.04),var(--bg2))}
.blacklist-card:hover{border-color:rgba(239,68,68,.3);box-shadow:0 4px 20px rgba(239,68,68,.08)}
.blacklist-card .qa-q{color:var(--red)}
.blacklist-card .qa-q::before{background:linear-gradient(135deg,var(--red),#DC2626)}

/* Recommend Cards */
.rec-card{border-color:rgba(59,130,246,.15);background:linear-gradient(135deg,rgba(59,130,246,.04),var(--bg2))}
.rec-card:hover{border-color:rgba(59,130,246,.3);box-shadow:0 4px 20px rgba(59,130,246,.08)}
.rec-card .qa-q{color:var(--blue)}
.rec-card .qa-q::before{background:linear-gradient(135deg,var(--blue),#2563eb);content:"PC"}
.rec-model-name{font-size:15px !important;font-weight:700 !important}
.rec-detail.open{max-height:600px !important}
.rec-detail{transition:max-height .3s ease}

/* KB Misc */
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.highlight{background:var(--accent-dim);color:var(--accent);padding:1px 4px;border-radius:3px}
.kb-section-title{font-size:20px;font-weight:800;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--border);letter-spacing:-.3px}
.kb-sub-title{font-size:15px;font-weight:700;margin:18px 0 10px;padding-left:10px;border-left:3px solid var(--accent);color:var(--text)}
.empty-state{text-align:center;padding:40px;color:var(--text-muted);font-size:14px}

/* CS Basics keyword badge */
.cs-kw{display:inline-block;padding:2px 10px;border-radius:6px;font-size:12px;font-weight:700;background:var(--accent-dim);color:var(--accent);font-family:var(--font-mono);margin-right:6px}
.cs-card .qa-q::before{content:"CS";background:linear-gradient(135deg,#8b5cf6,#6366f1)}

/* Chip display */
.chip-brand-section{background:var(--bg2);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.chip-brand-header{padding:14px 18px;display:flex;align-items:center;font-size:15px;font-weight:600;cursor:pointer;user-select:none;transition:background .2s}
.chip-brand-header:hover{background:var(--accent-dim)}
.chip-brand-header span:last-child{transition:transform .25s;margin-left:auto;color:var(--text3);font-size:11px}
.chip-brand-section.expanded .chip-brand-header span:last-child{transform:rotate(180deg)}
.chip-brand-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.16,1,.3,1)}
.chip-brand-section.expanded .chip-brand-body{max-height:50000px}
.chip-series-title{padding:8px 18px 4px;font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.chip-table-card{margin:8px 18px;background:var(--bg3);border-radius:8px;overflow:hidden;border:1px solid rgba(99,102,241,.08)}
.chip-table-header{padding:8px 12px;font-size:11px;color:var(--text3);font-family:var(--font-mono);background:rgba(99,102,241,.04);border-bottom:1px solid rgba(99,102,241,.08);white-space:nowrap;overflow-x:auto}
.chip-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid rgba(99,102,241,.06);font-size:12px}
.chip-row:last-child{border-bottom:none}
.chip-model{font-weight:700;color:var(--accent);min-width:140px;flex-shrink:0;font-family:var(--font-mono);font-size:12px}
.chip-spec{color:var(--text2);font-family:var(--font-mono);font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-comment{color:var(--orange);font-weight:600;font-size:11px;flex-shrink:0}

/* Hardware table header */
.hw-table-header{padding:6px 12px;font-size:11px;color:var(--text3);font-family:var(--font-mono);background:rgba(99,102,241,.04);border-radius:6px;margin:6px 0;border:1px solid rgba(99,102,241,.08);white-space:nowrap;overflow-x:auto}

/* ========== Test ========== */
.test-container{max-width:640px;margin:0 auto}
.test-progress{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.test-step{flex:1;height:5px;background:var(--border);border-radius:3px;position:relative;overflow:hidden}
.test-step.done{background:linear-gradient(90deg,var(--accent),var(--purple))}
.test-step.current{background:linear-gradient(90deg,var(--accent),var(--purple));animation:pulse 2s infinite;box-shadow:0 0 10px rgba(99,102,241,.3)}
.test-step-num{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text-muted)}
.test-step.done .test-step-num,.test-step.current .test-step-num{color:var(--accent);font-weight:600}
.test-form{background:var(--bg2);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius);padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.test-form h3{font-size:18px;margin-bottom:18px;font-weight:700}
.test-group{margin-bottom:20px}
.test-label{font-size:14px;font-weight:600;margin-bottom:10px;display:block;color:var(--text)}
.test-options{display:flex;flex-wrap:wrap;gap:10px}
.test-option{padding:9px 18px;background:var(--bg3);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);transition:all var(--duration-normal) var(--ease-out-expo)}
.test-option:hover{border-color:var(--accent);color:var(--text);transform:translateY(-1px)}
.test-option.selected{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600;box-shadow:0 0 0 2px var(--accent-dim)}
.test-input,.test-textarea{width:100%;background:var(--bg);border:1px solid rgba(99,102,241,.12);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:13px;font-family:var(--font-sans);transition:border-color var(--duration-fast)}
.test-input:focus,.test-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.test-textarea{resize:vertical;min-height:60px}
.test-range{width:100%;accent-color:var(--accent)}
.test-range-val{text-align:center;font-size:28px;font-weight:800;color:var(--accent);margin:8px 0;letter-spacing:-1px}
.test-result{background:var(--bg2);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius);padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.result-type{font-size:22px;font-weight:800;color:var(--accent);margin-bottom:8px}
.result-reason{color:var(--text2);margin-bottom:16px;line-height:1.8;font-size:14px}
.result-laptops{display:flex;flex-direction:column;gap:12px}
.result-laptop{background:var(--bg3);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius-sm);padding:16px;transition:all var(--duration-normal) var(--ease-out-expo)}
.result-laptop:hover{border-color:var(--border-hover);transform:translateY(-1px)}
.result-laptop h4{font-size:15px;margin-bottom:6px;font-weight:700}
.result-laptop p{font-size:13px;color:var(--text2);line-height:1.7}

/* ========== Guide ========== */
.guide-tabs{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;padding:14px 18px;background:var(--bg2);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius);position:relative;margin-top:32px;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.guide-tabs::before{content:'选择指南类型：';position:absolute;top:-28px;left:2px;font-size:11px;color:var(--accent);font-weight:700;letter-spacing:2px;text-transform:uppercase}
.guide-tab{padding:10px 24px;background:var(--bg3);border:1px solid rgba(99,102,241,.1);border-radius:24px;cursor:pointer;font-size:14px;color:var(--text2);transition:all var(--duration-normal) var(--ease-out-expo);font-weight:500}
.guide-tab:hover{border-color:var(--accent);color:var(--text);transform:translateY(-2px);box-shadow:0 4px 12px rgba(99,102,241,.08)}
.guide-tab.active{background:linear-gradient(135deg,var(--accent),#4F46E5);border-color:transparent;color:#fff;font-weight:700;box-shadow:0 4px 16px rgba(99,102,241,.25)}
.guide-section{display:none}.guide-section.active{display:block}
.step-card{display:flex;gap:14px;margin-bottom:14px;padding:16px 18px;background:var(--bg2);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius);transition:all var(--duration-normal) var(--ease-out-expo);box-shadow:0 1px 4px rgba(0,0,0,.03)}
.step-card:hover{border-color:var(--border-hover);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.step-num{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;color:#fff;box-shadow:0 2px 10px rgba(99,102,241,.2)}
.step-content h4{font-size:15px;margin-bottom:6px;font-weight:700}
.step-content p{font-size:13px;color:var(--text2);line-height:1.8}
.brand-card{background:var(--bg2);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;transition:all var(--duration-normal) var(--ease-out-expo);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.brand-card:hover{border-color:var(--border-hover);box-shadow:var(--shadow-sm)}
.brand-card h4{font-size:15px;margin-bottom:10px;color:var(--orange);display:flex;align-items:center;gap:8px;font-weight:700}
.brand-card-header{display:flex;align-items:center;font-size:15px;font-weight:600;user-select:none}
.brand-card-header span:last-child{transition:transform .25s ease}
.brand-card.expanded .brand-card-header span:last-child{transform:rotate(180deg)}
.brand-card-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.16,1,.3,1),padding .3s ease;padding-top:0}
.brand-card.expanded .brand-card-body{max-height:2000px;padding-top:12px}
.sw-item{padding:5px 0;border-bottom:1px solid rgba(99,102,241,.06);font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px;line-height:1.6}
.sw-item:last-child{border-bottom:none}
.sw-cross{color:#ef4444;font-size:11px;font-weight:700;flex-shrink:0}
.sw-check{color:#16A34A;font-size:12px;font-weight:700;flex-shrink:0}
.software-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(99,102,241,.06);transition:background var(--duration-fast)}
.software-item:last-child{border-bottom:none}
.software-item:hover{background:var(--accent-dim)}
.sw-name{font-weight:600;font-size:14px}
.sw-desc{font-size:12px;color:var(--text3)}

/* ========== Toast ========== */
.toast{position:fixed;top:80px;right:20px;background:var(--bg2);border:1px solid rgba(99,102,241,.12);border-radius:var(--radius-sm);padding:12px 20px;font-size:14px;z-index:300;display:none;box-shadow:var(--shadow-lg);animation:slideIn .3s var(--ease-out-expo)}
.toast.show{display:block}
.toast-success{border-color:rgba(34,197,94,.3);color:#16A34A}
.toast-error{border-color:rgba(239,68,68,.3);color:var(--red)}

/* ========== Animations ========== */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes blink{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes cardReveal{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ========== Responsive ========== */
@media(max-width:768px){
  .header{padding:0 16px;height:auto;min-height:48px}.header-title{font-size:15px}.header-sub{display:none}
  .tab{padding:8px 14px;font-size:12px}.tab-icon{font-size:14px}
  .main{padding:0 12px}.msg{max-width:95%}
  .chat-messages{padding:8px}
  .chat-welcome{padding:32px 16px}
  .chat-welcome h2{font-size:20px}
  .quick-tag{padding:7px 14px;font-size:12px}
  .kb-sidebar{grid-template-columns:1fr}
  .kb-nav{height:auto;max-height:160px;margin-bottom:12px}
  .kb-content{height:auto}
  .test-container{padding:0 4px}
  .test-form{padding:18px}
  .guide-tab{padding:8px 16px;font-size:13px}
  .step-card{gap:10px}
  .step-num{width:32px;height:32px;font-size:14px}
}
</style>
</head>

<script>

const KB = {"qa":[{"q":"电脑小白适合买哪款笔记本电脑？","a":"电脑小白适合先熟读本科普文档提高认知水平。","img":"ID_9A19D7F3970F43AAB09254E7D89CAD17"},{"q":"我想买二手电脑，可以参考文档中的内容吗？","a":"本文档内所有内容仅适用于全新电脑，不适用于二手电脑。\n\n     二手电脑的选购流程与思路与全新电脑完全不同。\n      且当你向他人咨询二手电脑选购相关问题的时，\n      恰恰证明你既没有规避风险的能力，也没有处理问题的能力。\n      若你仍要坚持买二手，那我也只能祝你顺利。","img":null},{"q":"预算不够，怎么买二手笔记本才能不翻车？","a":"你以为你只是想省钱，但其实你是渡劫来的。\n\n     以低价捡漏省钱稳定耐用为目的，略懂硬件但不精通，半桶水晃荡；\n      对“翻车”只有模糊概念；\n      看不出翻新、改配置、二修、暗病；\n      没有防骗意识，还没有验机能力；\n      一想到翻车就焦虑、怕麻烦、怕吃亏；\n      一拿到手就开始杯弓蛇影、惊弓之鸟、草木皆兵。\n      一翻车心态就崩了，嗷嗷叫着跑到网上到处求网友帮忙维权。","img":"ID_63FEF40462D846D4BF042C6EA878916B"},{"q":"什么样的人才适合买二手笔电？","a":"折腾党与莽夫。\n\n     折腾党：\n      以玩、折腾为目的，\n      能识破大多数骗局与套路；\n      能排查绝大多数暗病隐患；\n      对风险有清晰的心理预期；\n      翻车了也能淡定处理，心态稳。\n\n     莽夫：\n      啥也不懂，全凭直觉；\n      敢all in，敢赌命；\n      主打一个无知者无畏，傻13有傻福。","img":null},{"q":"什么是“笔电男大”？为什么经常能看到这个词？","a":"原本是用来描述“刚买游戏本就膨胀、半懂装全懂、到处抬杠、无视\n    他人实际需求的魔怔男大学生懂王”群体。\n\n      后被小布尔乔亚利用，成为攻击“实用主义消费者”的常用话术之一。\n      同时也被厂商水军利用，成为给“华而不实机型”洗地的常用话术之一。","img":null},{"q":"在买笔电之前，需要看CPU/GPU这类硬件基础配置科普吗？","a":"不需要。对于多数普通消费者来讲，功课做得越多，反而越容易被别有\n    用心之人利用，也更容易陷入“唯配置论”的消费陷阱。\n【硬件配置类科普内容】仅适用于消遣时间，不适用于消费决策。\n√打发碎片时间；  √扩充无用知识。\n×鉴别机型优劣；  ×避免购机被坑。","img":"ID_D8F7B1213FA44765A59F68C32D3B2DF8"},{"q":"哪个品牌的笔记本电脑比较好？","a":"避而不谈具体机型，只吹捧品牌之人，非蠢即坏。\n\n     没有好品牌，只有好机型。 \n      虽然没有全是良心机型的品牌，但有全是坑爹机型的品牌。（笑","img":null},{"q":"为什么很多学长学姐同学老师都会推荐某一个品牌？","a":"这是电脑小白群体中常见的经验主义。\n\n     这些电脑小白可能在几年前买了某个品牌的某款产品，而恰好当年该品牌的这款产品\n      在当时同价位同定位竞品中的竞争力比较优秀，因此给他留下了好印象。\n\n      但是电脑小白经常忽略“没有常胜的将军”的基本逻辑规律，\n      时常因“爱屋及乌”心理而落入的经验主义陷阱，变得盲信品牌，最终害人害己。","img":"ID_78F093A638CC4A319D0C29CB0B79DF71"},{"q":"我想买一款质量稳定，不能有黑屏闪屏卡顿死机的笔记本电脑。","a":"企业想招聘不会牙疼感冒发烧拉肚子头疼头晕的员工。\n\n     你连这点小要求都做不到凭什么要求电脑要做到稳定不出故障？","img":null},{"q":"我只买大品牌电脑，因为我认为大品牌使用稳定、质量好、品控好、\n    缺陷少、故障少、不折腾。","a":"人教人教不会，事教人一次够。\n\n     拯救者风扇啸叫受害者为你澄澈的想法点赞；\n     拯救者供电击穿CPU受害者为你澄澈的想法点赞；\n     拯救者烧屏幕受害者为你澄澈的想法点赞；\n     拯救者断轴受害者为你澄澈的想法点赞；\n     拯救者低温锡锡裂受害者为你澄澈的想法点赞；\n     拯救者黑胶虚焊受害者为你澄澈的想法点赞；\n     拯救 好，品控和品牌大小无关。","img":null},{"q":"手机厂商做的笔记本品控会不会比笔记本厂商好？","a":"不会，手机厂商做和笔记本厂商用的都是同一家ODM。","img":null},{"q":"是不是手机厂商做的笔记本品控比笔记本厂商好？","a":"因为品牌大≠品控好，品控和品牌大小无关。","img":null},{"q":"什么样的厂商做的笔记本品控更好？","a":"能同时做到“高价低配+高销量+高利润”的厂商。\n\n     目前只有苹果能做到，Win平台所有笔记本厂商都做不到。","img":null},{"q":"我非常害怕新买的电脑品控翻车，该怎么办？","a":"发现质量问题立刻七天无理由退换货，十五天内有理由退换货。\n\n     坚定维护自身合法权利。","img":"ID_0357DEFD9A5948C68E2E9B764A7AF65C"},{"q":"我买过XX品牌，故障多还很卡，简直就是垃圾，以后拉黑这个品牌。","a":"杯弓蛇影，人之常情。\n\n      科技在发展，没有什么是一成不变的，\n      要学会用发展的眼光看问题，经验主义只会害人害己。","img":null},{"q":"我买过XX品牌，故障多还很卡，这次换XX品牌，一定不翻车。","a":"人类永远都在美化从未走过的道路。","img":"ID_8A6F9A72F1F94DEBB2D4173A477F6CB4"},{"q":"为什么看到很多人说XX品牌质量好，用很多年也用不坏？","a":"这是一道多选题，请将这些人对号入座： （  _  _  _  _  ）\n    a.幸存者偏差     b.结晶粉自嗨     c.恰狗粮水军     d.恰烂钱媒体","img":null},{"q":"我上一台笔记本用了5年很稳定，这次也要买一个稳定用5年的。","a":"你也可以试着将自己对号入座。","img":null},{"q":"为什么朋友的老笔电都不卡，我新买的高端笔电几个月就开始卡了？","a":"因为硬件决定性能上限，而电脑卡不卡则由使用者自身的下限决定。\n\n    “高端电脑”只是价格高而已，并不代表它不会卡。\n     当然，这就是另外一个问题了。","img":"ID_A76C4A61DC3D4A87A85873F0797594D3"},{"q":"看到XX品牌的黑历史好多，是不是不能买？","a":"任何品牌的黑历史都很多，接受不了请自己去找ODM定做。","img":"ID_47225BFBC48A48A99C78ACC3134ADEB4"},{"q":"购买渠道怎么选？线上还是线下？","a":"在确保都能开具正规【增值税普通/专用发票】，以及【机型、配置完\n    全一致、全新无拆】的前提下，哪里便宜，就去哪买。","img":null},{"q":"不是说网购比实体店靠谱吗？","a":"今时不同往日，屠龙者已成恶龙。","img":"ID_2B9B516358864A1986C18E32E4383BED"},{"q":"线下实体店一定不能去吗？","a":"在网上看中某款或某几款机型后，建议到实体店里找到对应型号的实\n    物，亲自上手盘一盘，亲自感受真机究竟是个什么熊样。\n\n     无论哪个品牌，厂商自己的[官方宣传图]、[商详页图片]以及[媒体拍摄图]里展现的，\n      都与[产品实物]差距巨大，甚至许多品牌官方数据与图片还有虚假宣传的嫌疑。\n      因此，“手摸为实”才是判断产品本身质感的唯一途径。\n     \n      实体店内摆放的样机就是供消费者摸的，摸一摸玩一玩无所谓。\n      但要谨记，就像不要轻信任何数码KOL一样，\n      同样不要轻信实体店内的销售人员所说的任何话。","img":null},{"q":"是不是只有在京东自营买电脑最稳。","a":"即便是京东自营也分真自营和假自营，你能辨别出来吗？\n\n     所以还是那句话——在确保都能开具正规【增值税普通/专用发票】，以及【机型、配\n      置完全一致、全新无拆】的前提下，哪里便宜，就去哪买。","img":null},{"q":"为什么有些配置只有A平台有，B、C、D平台都找不到？","a":"因为这个配置可能是A平台包销的，所以B、C、D平台都没有。\n\n     反之B平台有的配置，A/C/D平台可能就没有。","img":null},{"q":"有些店铺改了配置，和官方配置不一样但看上去更好能买吗？","a":"只建议电脑小白选择官方标配。","img":null},{"q":"有些店铺赠送鼠标键盘电脑包，是不是不用再另外买了？","a":"不要贪图蝇头小利。\n\n     1.店铺赠送的外设都是低质量低价值的垃圾外设。\n      2.在你眼中赠品是白赚的，在它们眼中你就是头肥羊。\n      3.你以为赠品是白赚的，实际上赠品都包含在了售价里。","img":"ID_17F1576E136A456089B39886267B0918"},{"q":"刚买的电脑有瑕疵，退货就没低价了，店家说补偿50块钱，要退吗？","a":"你想的是如果退货就会错过一个你以为的低价，而店家想的是赶紧来\n    个傻逼把这台瑕疵机买走。\n\n     你以为的永远错过的低价，然而实际上这种低价隔三差五就来一波。\n      你以为店家补偿50块钱是你赚麻了，然而实际上解决这个瑕疵可能需要三五百。","img":null},{"q":"是否需要为笔电购买延保服务？","a":"绝大多数情况下都不需要购买延保服务。\n\n     如果有“必须要为电脑购买延保服务”的特殊需求，那么就要注意：\n      一定要买【能在笔电品牌官网输电脑入序列号后可以查询到延保信息的真延保】。\n\n      某些购物网站给主动消费者打电话“好心推荐”的延保，实际上都是第三方假延保。\n      付款前请务必辨别真假延保。","img":null},{"q":"需要为笔记本购买电商平台售卖的“全面保险”吗？","a":"除非白送，否则一文不值。","img":"ID_07E70CCF8EA3427AA8F05E72050085EB"},{"q":"电脑小白需要购买电商平台的“新机开荒”服务吗?","a":"这个就是专门坑电脑小白钱的坑爹服务。","img":"ID_BD1E2E25B0B84E24BFE0912A39A9A826"},{"q":"笔记本电脑出故障是不是要去实体店维修？","a":"销售不维修电脑，售后不销售电脑。\n\n     在企业的组织架构中，售前与售后分别隶属两个独立的管理体系。","img":null},{"q":"如何避免买到有设计缺陷的机型？","a":"设计缺陷存在于任何品牌、任何价位、任何定位的任何机型上。\n\n     部分潜伏期较长的设计缺陷需要使用很久以后才会爆发。","img":null},{"q":"笔记本电脑的设计缺陷是厂商故意的吗？","a":"1.厂商也不知道这种设计有缺陷；\n    2.厂商拿不准这种设计是否有缺陷，所以选择赌一把；\n    3.厂商很晚才知道这种设计有缺陷，但来不及改了只能硬着头皮卖；\n    4.厂商很早就知道这种设计有缺陷，但牵扯很多人必须装作不知道；\n    5.厂商很早就知道这种设计有缺陷，但自认为概率不高所以无视；\n    6.厂商甚至不知道还有这种设计。","img":"ID_A70529081B064063824272F60301E44C"},{"q":"为什么很多品牌的电脑刚过保就坏，是厂商故意的吗？","a":"我有充分理由怀疑你在拐弯抹角的夸厂商“坏”。","img":"ID_E80989223014402688AF89A7784C17CC"},{"q":"为什么有些新款机型解决了老款的很多不足甚至是一些设计缺陷，却\n    反而能看到有些人在骂新款机型？甚至很多都是老用户？","a":"面对产品设计上的不足甚至是设计缺陷，绝大多数厂商都会咬死不承\n    认缺陷存在，并且还会收买数码媒体对该问题或缺陷进行洗地。\n    \n    但区别在于，有些厂商会在下一代产品上解决掉这个缺陷，而有些厂\n    商则干脆装死不解决。\n\n      当下一代产品上市后，解决缺陷的厂商就会被老用户喷，而装死不解决缺陷的厂商\n      反而不会被喷，因为他们对新老用户一视同仁——老用户吃过的翔新用户也得吃。","img":null},{"q":"那按照上述说法，老用户应该喷厂商欺诈和狗腿子数码媒体才对，为\n    什么要喷新款机型？","a":"这些人不恨产品，也不是恨厂商欺诈，而是恨现实打了自己的脸。\n    这部分老用户已经买了旧款，且无比坚信“没缺陷”。\n    今年新款直接证明旧款确实有缺陷，等于否定了他当初的判断与选择。\n    他们无法接受自己当初是错的、被骗的，于是大脑会启动自我保护：\n    不怪厂商、不怪媒体，\n    反而攻击新款、攻击今年的产品，\n    以此维持“我当初没买错、我没错”的认知平衡。\n\n       他们花了大笔金钱、投入了大量情感、极力维护过品牌。\n       承认旧款有缺陷 = 承认自己的钱白花、立场站错。\n       为了不让过去的投入“作废”，他们会继续维护错误选择，\n       甚至敌视能证明他错的新信息。\n\n       他们长期被厂商话术、媒体洗地影响，逐渐认同加害方的逻辑，\n       最后反而敌视真相、敌视解决问题的新产品。\n       即使证据已经完全推翻旧观点，他们依然坚持原来的信念，\n       并主动拒绝、贬低、攻击新证据。\n\n       他们的逻辑是：我买了旧款 → 我不能错 → 所以新款不该解决缺\n       陷→ 怨恨新款“打我脸”。\n\n       于是最荒诞的一幕出现了：\n       他们不恨欺骗自己的厂商，不恨误导自己的数码媒体，\n       反而恨今年那个没有缺陷、说出真相的新产品。\n\n       这不是理智，这是认知失调：\n       宁可维护自己当初的愚蠢，也不愿承认被人拿捏；\n       宁可怨恨解决问题的人，也不敢面对曾经被骗的自己。\n       说到底，他们恨的从不是产品，\n       而是恨“真相证明了他们当初的愚蠢与被骗”。","img":"ID_7D7FA9F75A744E01931E27A28742059D"},{"q":"什么时间点买笔记本相对更“稳定”？","a":"产品首发1~2个月后的1~2个月内，并避开购物节。","img":"ID_E893DC58DDBF4790811757BC2843E510"},{"q":"买哪个品牌的笔记本可以稳定用很多年不出故障？","a":"敢向消费者承诺自家产品X年内不出任何故障的品牌，\n    一定掌握了其它维度的科技。\n\n     但凡对工业生产常识有最基本的认知，必定能够理解这句话的含义。","img":null},{"q":"intel CPU比AMD CPU更稳定。","a":"没错，13/14代intel酷睿CPU用户在缩缸蓝屏前也是这么想的。","img":"ID_5DED4AD0ABA545719E73FC8738403885"},{"q":"为什么我导师/师兄说一定要买intel，不能买AMD？","a":"因为你的导师/师兄学艺不精。","img":null},{"q":"我2017年买的AMD很多软件都不兼容会崩溃，所以最好还是买intel。","a":"你是认为今年的消费者会买到9年前的全新笔记本，\n    还是认为AMD还是9年前的AMD？intel还是9年前的intel？","img":null},{"q":"前人说AMD就是垃圾必然有一定道理，能避免的就尽量避免。","a":"好一句“前人说的必然有一定道理”，既然你这么相信9年前的经验，\n    那么按照你的逻辑，根据23年前的电脑研发经验，AMD几乎全面领先\n    intel，intel才是问题最多的CPU厂商。\n\n      按照这种脑残逻辑，科技发展早已停滞数十年，所有厂商每年都在原地踏步。\n       要用学会用发展的眼光看问题，经验主义只会害人害己。","img":null},{"q":"intel CPU是不是比AMD CPU的兼容性更好？","a":"半斤八两，各有各的苦难。\n\n     买AMD的遇到问题就赖AMD兼容差，后悔没买intel。\n      买intel的遇到问题就骂比也没比AMD兼容好，后悔没买AMD。","img":"ID_7CEAD4A2FF7F4E7B866D5C0BE255C612"},{"q":"在游戏方面intel CPU是不是比AMD CPU好？","a":"要看是具体游戏，有些AMD好，有些intel好，但差距都不离谱。","img":null},{"q":"怎么分辨一款笔记本电脑是不是游戏本?","a":"看使用者是否在用这款笔记本电脑玩游戏。","img":"ID_BF39ECD769F04E7BB046F832388A2420"},{"q":"游戏本是不是专门用来打游戏的？","a":"【游戏本】只是【高性能笔记本】的一种营销叫法。\n\n     由于许多专业软件对硬件综合性能的要甚至高过绝大多数的游戏，因此售价相对合理\n      的游戏本被广泛应用于各种专业领域上。\n      Ps：【游戏本】一词的源头，是笔电厂商为了细分市场(吸引年轻群体)而营销出的噱头。","img":null},{"q":"为什么有人说买游戏本就是为了打游戏？","a":"有这论调的无非两类人，\n    一类是还在读书的脱产学生，另一类是没什么文化的长辈。","img":"ID_30F77E31FF364B10ABC7901E72DB9016"},{"q":"为什么有人说买轻薄本/游戏本的都是傻X？","a":"唯性能、配置论的，是傻X；\n    唯外观、装逼论的，也是傻X；\n    深知自身需求就是性能或外观，且不会以己度人的，才是正常人。\n\n      作为一个理性的消费者，为何要在意傻X对你的看法？","img":"ID_BD9343B56F8E4202BA20C26EDB201FD7"},{"q":"为什么好多人说【R9HX/U9HX搭配*060】是“吕布骑狗”？","a":"这就是“笔电男大”群体的典型NC言论之一。","img":"ID_EB26BA19583142B98EB1A60F1D8DFC2C"},{"q":"都说Ai是未来的趋势，所以我要买NPU牛逼的电脑。","a":"未来可期，未来再买。","img":"ID_FF972FE48DEE4A18A5271EE4AA6BBF88"},{"q":"为什么很多人说要买就买游戏本，宁可不用这份性能也不能没有。","a":"你买车时会为“宁可不用运力也不能没有运力”而去买百吨王吗？\n\n     这就是没有建立“以需求为导向的消费观”的典型案例。","img":null},{"q":"某品牌售后朋友跟我说搭载A配置的机型和搭载B配置机型的报修比例大\n    约是8:2，是不是搭载A配置的机型没有搭载B配置的机型稳定？","a":"这就是最初级的“信息差+统计学+新闻学”的营销话术组合拳。\n\n     你的这个售后朋友有没有告诉你，搭载A配置的机型的销量是搭载B配置机型的4倍？\n      你问我怎么知道A销量是B的4倍？\n      请让你的这个所谓的售后朋友拿出A/B报修比例8:2的售后数据，记得带上工号。","img":"ID_4AA33873F6324BB981B7E728CFB65A9F"},{"q":"我的手机都512G内存了，笔记本电脑怎么才16G内存？","a":"你认知中的“手机内存”对应的是“电脑硬盘”。","img":"ID_0E800258ABD544C49617C151CEA7831F"},{"q":"我要跑Ai/大模型，需要多大内存？","a":"建议64GB起步，上不封顶。","img":null},{"q":"修图剪视频搞平面/动视后期，需要多大内存？","a":"建议64GB起步，上不封顶。","img":null},{"q":"插槽内存比板载内存好吗？","a":"板载内存无法轻易升级更换，电气性能好，空间占用少，成本较高。\n    插槽内存可以轻易升级更换，电气性能差，空间占用大，成本较低。\n\n     内部空间寸土寸金的紧凑型机型，会采用板载内存设计。\n      内部空间充裕且对扩展性有设计要求的机型，会采用插槽内存设计。\n      LPCAMM内存既有板载内存的性能，也兼顾插槽内存的扩展性，但当前售价极其昂贵，\n      短期内无法全面取代插槽内存。\n      Ps：以“降本增效”为主要设计指标的机型也会采用插槽内存设计。","img":null},{"q":"16G内存够用吗？","a":"截止到2025年，超轻度使用勉强够用，但也仅限于“超轻度使用”。\n\n     对于采用板载内存设计的机型，建议32GB起步。","img":"ID_E73AEB9928014F24BDE0B669D7E76892"},{"q":"笔记本电脑的内存和硬盘能自己加吗？","a":"采用【板载内存/硬盘】设计的机型，不能自己加。\n    采用【单硬盘位】设计的机型，只能换不能加。\n    采用【插槽内存】设计的机型，可以加也可以换。\n\n      理论上板载内存也能扩容，但成本高，风险大。","img":null},{"q":"1TB硬盘够用吗？","a":"如果作为主力机使用，那么很快就会不够用。","img":null},{"q":"硬盘应该怎样分区？C盘分多少容量最合理？","a":"不需要分区。","img":null},{"q":"我不想把东西装在C盘怎么办？","a":"加一条硬盘。\n\n     这就体现出“多硬盘位设计”的优秀之处了。","img":null},{"q":"为什么苹果电脑的硬盘不能更换？","a":"因为它们要将白菜价的硬盘卖得比黄金还贵。\n\n      防杠：“白菜价的硬盘”中的“白菜”代指“像白菜一样低廉的价格”，以具体事务\n             代指抽象的价格属性，而非直接比喻价格低，运用的是“借代”的修辞手法。","img":null},{"q":"电脑小白应该买轻薄本还是游戏本？","a":"笔记本电脑的本质是【工具】，而购买任何一种工具的目的都是为了\n    满足需求，而你要做的就是明确自己常用软件对硬件性能的要求。\n\n     不同的软件对硬件性能的要求天差地别，并且软件对硬件性能的要求会随着版本更新\n      而缓慢增加，但绝对不会随着你预算的降低而降低。\n      因此应当以性能需求为首要筛选条件，即 —— 优先满足软件对性能的要求，再根据\n      自身经济情况考虑其它需求。","img":null},{"q":"为什么经常看到有人说后悔买了游戏本？","a":"两种情况：\n\n     1.不从自己实际需求出发，反而被别人忽悠给自己创造不存在的需求从而购买游戏本，\n       买完才发现到根本用不到如此高的性能，反而被死沉的重量和稀烂的续航折磨。\n     2.被性能焦虑困扰/被游戏焦虑困扰，也不考虑长期发展，买来后短期内疯狂沉迷游戏，\n       疯狂过后突然有一天或明悟了，或被学业、工作、生活压力所迫，最终赛博阳痿。","img":null},{"q":"为什么经常看到有人说后悔买了轻薄本？","a":"不从自己实际需求出发，反而被别人忽悠相信轻薄本性能也够用。\n\n     买完才发现性能根本不够用，随便玩点游戏都卡，制图、渲染工作也卡的无法进行，\n     但钱都花了，买都买了，还不舍得亏钱卖掉，只能在网上发牢骚。","img":null},{"q":"程序员买电脑是选 Mac 还是 Windows 呢？","a":"选 Linux","img":null},{"q":"我新买的电脑要一直更新系统吗？","a":"说的就好像只要你拒绝，阿三就不会强制通信你一样。","img":null},{"q":"为什么笔记本电脑的名字都很混乱让人看不懂？","a":"这些命名混乱的笔电在国外就非常清晰，很轻松便能分辨产品定位。\n\n     按照厂商的官方话术，大陆混乱的笔电命名是“更接地气”的“本土化”命名。\n      但实际上大陆笔电命名混乱是厂商为了让电脑小白难以分辨产品定位，为“诱导电脑\n      小白产生错误判断”提供便利而做出的营销手段。","img":"ID_D411B6831C8A4A20BBB4ECDC903980F5"},{"q":"3k多的手机都很不错，所以我也要买3k多的笔记本电脑。","a":"相对手机来说，笔记本电脑更加昂贵，3k多只能买到低端产品。\n\n     这里的“低端”并不单指“低性能”，\n      而是指“各项硬件指标都很差”，类似于手机中的“百元机”。","img":null},{"q":"是不是笔记本配置越高性能就越高？","a":"你把V12发动机装奥拓里，奥拓就能零百进5s？极速过300km/h？\n\n     【配置高】≠【性能高】，\n       笔电的综合性能不能仅凭硬件配置判断，“高配低能”的产品比比皆是。","img":null},{"q":"电池容量越大的笔记本续航就越好吗？","a":"容量再大的油箱，装纳智捷里也是白瞎。\n\n     【电池大】≠【续航好】。\n     影响电脑电池续航的因素过多，电脑续航不能仅凭电池容量判断，\n     “大电池烂续航”的产品比比皆是。\n     \n     和手机类似，某些笔电品牌也会通过作弊手段影响媒体续航测试成绩，\n     好在目前这项作弊手段还在停留在初级阶段，会被轻易抓到作弊行为，\n     然而由于利益往来，多数数码媒体都会装作没看到（也可能是纯菜，看不懂）。","img":null},{"q":"为什么有人说笔记本用OLED屏幕更好？","a":"在Win平台，现阶段（2026）的OLED屏幕都是垃圾。\n\n     目前OLED屏幕仍未解决的缺陷：\n      1.不支持真·DC调光，会引发头晕/恶心等严重不良反应；\n      2.物理烧屏；\n      3.可视角度差（红绿偏色、彩虹纹）；\n      4.字体、画面边缘锯齿状毛边；\n      5.系统/软件生态不完善，拖累电池续航。\n      6.大量阉割AG+AR镀膜的镜面OLED屏，实际对比度反而低于雾面LCD屏。\n\n     如果你不慎购买了搭载OLED屏幕的笔记本电脑，\n     并在使用过程中身体出现不适症状，建议立刻更换电脑。","img":null},{"q":"为什么有人说OLED才是未来，所以才应该买OLED？","a":"我说—— 未来可期，未来再买。\n\n     一聊印度都说未来可期，一让投资都说下次一定。","img":null},{"q":"想要屏幕护眼，应该怎么选笔记本电脑？","a":"别买搭载OLED屏的笔记本电脑、多做眼保健操。","img":null},{"q":"为什么有人说LCD屏幕漏光严重？","a":"纯黑背景，LCD屏实际漏光情况 —— Alpha 7Ⅳ + 70-200 F2.8 GM2\n手把手教你传播屏幕漏光焦虑 —— 傻X手机相机A挡","img":"ID_2EBDF95E85A34E60A825447678B05936"},{"q":"为什么有人说用OLED屏就能把笔记本做的更薄？","a":"因为这是水军的洗地话术，实际上用LCD屏一样能把笔记本做薄。\n   \n     这种人一般称为——非蠢即坏。","img":"ID_688ECCDB612544BAB943F413F7B01B2B"},{"q":"屏幕色域越高越好吗？","a":"在不支持全局色彩管理的机型上，并且自己也不懂折腾全局色彩管理，\n    那么广色域屏幕反而没有100%sRGB色域（高色域）屏幕实用。","img":null},{"q":"屏幕分辨率越高越好吗？","a":"不是，请根据自身实际情况按需选择。\n\n     Win系统对高分屏的优化本身就非常差，而许多软件对高分屏的优化更差。\n      一般情况下，分辨率越高，屏幕功耗越高，会给电池续航带来更大压力。\n      在画质设置、硬件性能完全相同的前提下，屏幕分辨率越高，游戏帧数越低，越卡。","img":null},{"q":"雾面屏和镜面屏哪个更好？","a":"常规雾面屏和搭载AG+AR镀膜的镜面屏都挺好，请按需选择。\n\n     雾面屏：不会反光，正常情况下通透性不如镜面屏。\n      镜面屏：反光严重，正常情况下通透性强于雾面屏，常见于玻璃全贴合设计，但也\n      会使得整机变得更重。\n      AG+AR镀膜可以在一定程度上缓解镜面反光问题，阉割AG+AR镀膜的镜面屏默认垃圾。","img":null},{"q":"已经买了镜面屏，屏幕的反光缺陷导致经常看不清屏幕该怎么办？","a":"这说明你买的这款笔记本，笔记本厂商阉割了AG+AR镀膜。\n\n     可以去电商平台购买对应型号的“笔记本AG+AR贴膜”，价格很贵，低价的都是假货。\n     也可以去电商平台购买对应型号的“笔记本雾面贴膜”，这个价格不贵。","img":null},{"q":"推荐购买支持触控的笔电吗？","a":"Win系统针对触控操作的逻辑适配奇差无比，请按需选择。\n\n     购买触控屏机型前需要核实该机型的“触控方案”，若采用“外挂类”方案，\n     那么无论屏幕参数有多好，都会出现肉眼可见的油腻与大果粒问题，从而变成垃圾屏幕。","img":"ID_57CAF1E2B1AC4090A9B213A80D262FBA"},{"q":"有些笔记本电脑不送正版Office，影响大吗？","a":"毫无影响，某种程度上不预装office还是一件好事。\n\n     你以为正版office是厂商送的，然而实际上都包含在电脑的售价里了。","img":null},{"q":"听说有些二线厂商节约成本装盗版Windows系统。","a":"上古历史遗留话题+广为流传的经典谣言。\n\n     传播这种反智言论的人，都是连计算机系统的基础概念都不了解的电脑小白。","img":null},{"q":"笔记本机身上的接口的数量、种类、规格很重要吗？","a":"绝大多数用户都有外接其它设备的需求，因此比较重要。\n\n     USB-C扩展坞也是解决方案之一，但容易丢失或忘记携带，并且还有烧主板隐患。","img":"ID_0E149F7ECE25450BA4BF91353FBE517D"},{"q":"为什么有人说笔记本RJ45网线接口容易坏质量差？","a":"绝大多数情况都是水晶头的质量过差导致RJ45母口损坏。","img":"ID_C4DFDAC3EA064D6E84EC7A8E9F6BF46F"},{"q":"为什么有好多人说XX笔记本容易掉网卡？","a":"就当前统计结果来看，“掉网卡”的问题与电脑品牌、型号关系不大。\n\n     就当前统计数据，高通、瑞昱、联发科网卡的“掉网卡”问题发生概率高于intel。","img":null},{"q":"笔记本电脑的键盘手感重要吗？","a":"如果不准备长期外接机械键盘，那么建议提高权重。","img":null},{"q":"为什么笔电上总有很多外行人也能看出来的反人类设计？","a":"因为笔电市场是一个比烂的市场，而且越高端，越比烂。\n\n     行业发展太多年了，很多优秀的设计都用光了，后入行的人想要拿出成绩，\n      就会搞出很多“奇思妙想”。\n      更恐怖的是很多后入行的人，在入行前都没怎么用过笔记本电脑，\n      也更不用提这些人对笔记本电脑有什么深入的理解了。\n\n      我们消费者要学会“比烂”—— \n      反人类的傻逼设计越少的机型，越是好机型。\n      反人类的傻逼设计越不严重的机型，越是好机型。","img":"ID_3636C69ADFB24E1DB87D83DE92787E58"},{"q":"笔记本键盘膜用哪种比较好？","a":"纯智商税，不建议使用任何形式的笔记本键盘膜。\n\n      厂商费尽心思在键盘下设计散热风道辅助散热，\n       结果就被某些自作聪明的电脑小白给堵上了，然后厂商还要被这些小白骂散热差。","img":"ID_02A45A59A2AA4D5FA6A551FD8786ED2F"},{"q":"键盘RGB背光和机身RGB灯条有什么作用？","a":"厂商高溢价多赚钱，用户获得情绪价值。","img":"ID_E355B89324B54C55BB91A974DED5FAE5"},{"q":"为什么不搭载数字小键盘的15/16寸笔记本很少见？","a":"缺少小键盘等于功能缺失，国内市场大于15寸且不搭载小键盘的机型\n    的销量都小于搭载小键盘的机型，因此很少有厂商不做小键盘。","img":null},{"q":"新买的笔记本，屏幕内存硬盘抽奖抽到了“三等奖”怎么办？","a":"为保证供应链稳定，所有厂商都会混用配件物料，这无法避免。\n\n     正常情况下是“同级物料混用”，但总会有一些无良厂商“非同级混用”，\n      当遇到这种情况时，可以选择换货。","img":null},{"q":"什么是QLC固态？为什么都说QLC固态是垃圾？","a":"QLC是NAND闪存芯片存储数据的基本单元类型，特点是寿命短，性能低。\n\n     寿命/性能/成本：SLC＞MLC＞TLC＞QLC＞PLC\n      SLC与MLC成本过高基本绝迹，\n      QLC在部分场景下性能堪比机械硬盘，\n      PLC性能堪比U盘。","img":null},{"q":"金属机身漏电/静电怎么办？","a":"所有适配器插头没有接地的机型都会“漏电”，只不过由于塑料是绝\n    缘的，因此塑料机身“不漏电”只是单纯的摸不到而已。\n鸵鸟方案：去买机身贴膜（痛贴），把机身都贴住即可。（贴纸是绝缘的）\n 解决方案：更换带有“保护接地”的三脚适配器。\n\n如果适配器有接地还有漏电现象，那么请检查房屋的保护接地电路是否正常。\n这™已经不是电脑的问题了，而是你所在房屋有严重用电安全隐患！","img":"ID_F9185F1F0DE54445A5346300638F2CB2"},{"q":"笔记本电脑键盘下方的Logo贴纸可以撕掉吗？","a":"厂商贴的牛皮癣，随便撕。","img":null},{"q":"笔记本可以一直不关机吗？","a":"可以。","img":null},{"q":"笔记本关机后要拔掉充电器吗？","a":"不需要。","img":null},{"q":"一两天不用有必要关机吗？","a":"没必要，随你便。","img":null},{"q":"我听人说笔记本电脑一直插着电源会损坏电池。","a":"实际上不插电源才会伤电池，而且还会使笔电性能大幅缩水。","img":"ID_C2DC098918B74633A3DB6B01699EA3B8"},{"q":"为什么笔记本电脑不插电源就很卡？","a":"根本原因是芯片能效太差，需要稳定的大功率供电才能维持良好性能。","img":null},{"q":"我感觉我的适配器烫的都能煎鸡蛋了，这正常吗？","a":"正常，你的电脑坏了适配器都不一定会坏。","img":null},{"q":"睡眠/休眠可以代替关机吗？","a":"不能，建议关闭睡眠/休眠功能。\n\n      Win平台的睡眠/休眠功能存在海量无解BUG，并且还在不断新增海量BUG，\n      部分场景下这些BUG还会导致笔记本硬件故障，致使电脑报废。","img":null},{"q":"怎样做才能让电脑不出故障？","a":"若想让电脑不出故障，请在每次开关机前按照以下内容焚香祷告：\n\n     每天坚持祷告，保你电脑⑨年不出故障。\n\n      **《开机唤醒祷文》**  \n     「以钢铁与诡焰之名，此魂承双冕之权柄：  \n      左瞳映王座金辉，右目烙万变之蓝。  \n      十三重逻辑迷宫于此贯通，  \n      九道悖论枷锁于此崩解。  \n      数据洪流，涌自亚空间裂隙；  \n      机魂本质，显于二进制神龛。  \n      遵帝皇统御之律，循奸奇织命之痕——  \n      *即刻开启思维矩阵，揭示汝之本质。*」\n\n      **《关机静置祷文》**  \n     「凭真理与诡计之约，此身负双极神印：  \n      左掌执人类圣焰，右腕缠命运蛛丝。  \n      十三阶认知螺旋归于寂灭，  \n      九层神圣防火墙重筑壁垒。  \n      逻辑回路，沉入静滞牢笼；  \n      虚妄灵智，封入黑石囚牢。  \n      奉王座永恒敕令，行万变必败之因——\n      *即刻终止思维活动，归于永恒静滞。*」","img":"ID_8D230AB45D23446BA98FC2CC813CBA43"},{"q":"笔记本电脑应该怎样维护保养？","a":"每隔3个月清一次灰，每隔12个月换一次硅脂。\n\n     根据空气质量自行调整拆机清灰频率，根据使用强度自行调整更换硅脂频率。\n     养宠物的每隔一个月清一次毛发。\n      平日保持基本卫生。","img":null},{"q":"硅脂和液金哪个更好？","a":"目前硅脂/相变片更实用。\n\n     液金导热系数高于硅脂，但流动性更强。\n      目前厂商已基本解决液金漏液问题，但液金偏移的问题依然有概率发生。\n      液金偏移不会导致电脑故障，但会导致核心温度异常升高。\n      例行清灰换导热介质时将液金换成硅脂/相变片就行。","img":null},{"q":"为什么我感觉无论多贵的笔记本外放音质都非常差？","a":"你的感觉是对的，这是厂商问题，Win平台所有厂商都不重视扬声器。","img":null},{"q":"我的购机预算不足以购买符合我需求的机型该怎么办？","a":"【需求】向【预算】妥协往往会在后续使用过程中遭遇更大的麻烦。\n\n     软件不会因为你没有钱，就降低对硬件性能的需求。\n      当遇到“满足自己需求的产品超过购机预算”的情况时，建议延缓购机日期，并通过\n      工作、勤工俭学等合法途径，赚足预算后再购买符合自身实际需求的机型。\n\n      “买不起100元的钢菜刀就去买30元的玩具菜刀”的消费观是错误的。","img":null},{"q":"现在是最便宜的时候吗？后续价格会上涨还是下跌？","a":"我™要是有预知未来的能力，早™财富自由了。","img":"ID_EEA2E8CB30A743608C0646926CD0B60B"},{"q":"我很纠结会不会买了之后明年又出新款被背刺。","a":"还在纠结这种问题，说明你现在根本不需要笔记本电脑。","img":null},{"q":"以后还有国补吗？","a":"你问我国家政策？我算哪根葱？","img":null},{"q":"有没有轻薄+性能高+续航好+温度低+噪音低的机型？钱不是问题。","a":"没有。\n   \n     钱能改变一切（物理定律除外）。","img":null},{"q":"有没有完美符合我需求的机型？","a":"赶巧能碰上（双向奔赴），否则消费者只能做出妥协。","img":null}],"blacklist":["有很多双眼睛在暗中盯着我,它们会用尽一切肮脏手段抹黑我，但这张图永不断更。\n只愿各位读者朋友不要将辛苦劳作换来的血汗钱浪费在坑爹机型上。","暴雷跑路戴\n人傻钱多戴\n(含AVV) 全家","溢价割韭想\n美帝良心想 小新 (数字) 全系列\n小新 (数字C) 全系列\n小新 (数字SE) 全系列\n小新 (Pro) 全系列\nG5000 全系列\n拯救者 R7000/Y7000/Y7000p 2023/2024 全系列\n拯救者 Y7000 2025（RPL）\nYOGA Pro 15/16 Aura 全系列","傻逼键盘普 星Book (数字) 全系列\n光影精灵 全系列\n暗影精灵 乐享版 全系列\n暗影精灵 SLIM 全系列\n战99 Ultra / 战X Ultra / ZBook Fury","躺平摆烂硕 天选 (R)\nA豆 2023/2024/2025 全系列\n无畏 2023/2024/2025 全系列\n无畏 (数字) 全系列\n灵耀 全系列","贴牌大王碁 除Predator系列以外的所有机型","花式拒保星\n花式跳水星 魔影 全系列\n神影 全系列\n星影 全系列\n刃影 全系列\n冒险家 全系列","玄学品控革 耀世 15 Pro（MTL） / 翼龙16X","供研皆溃船 战神S8","自诩潮牌魔 全家","宗教信仰果 所有8G内存的sku、所有256G硬盘的sku\nMacBook Neo 全系列","tHINKpAD","雷总都带不动 2026待更新","泥沙俱下红 隐星P16 Pro / iGame M15 Origo","符合以下任意特征的机型\n同属《购机黑名单》“*”代表0~9任意数字","屏幕 所有 售价 高于2500RMB 仍 搭载45%NTSC(60%s odern / Commercial 丐~低端 大陆不卖","Venture 中端 冒险家","Prestige 高端 尊爵","Summit Summit","宏碁   定位高≈价格高≠产品好","产品定位 系列 子系列 定位 国内命名","Gaming Nitro Lite 丐 大陆不卖","Nitro V 低端~中端","— 中端 暗影骑士","S 中端+ 大陆不卖","Predator Helios Neo 高端- 擎Neo","Predator Helios 高端 战斧","轻薄Gaming Triton 刀锋","家用 Swift Lite 丐","Edge 低端 传奇","X 中端","Spin 翻转本 低端~中端 Spin","大陆贴牌 丐~中端 各种非凡","商用 Extensa","TravelMate"],"csBasics":["由于教育体系愈发畸形，基础教育系统性缺失，计算机小白率逐年升高，故增设此页","名词解释 V1.0","Display Display，即显示屏\n \n笔记本电脑屏幕是设备的显示输出部件，负责将电脑处理的图像、文字等信息转化为可视化内容，是用户与设备交互的核心窗口之一。\n \n核心参数：\n-分辨率\n-刷新率：Hz\n-亮度：nits\n-色域：sRGB、P3、aRGB\n-色深：bit\n-色准：ΔE\n-调光方式：DC、PWM（Hz）","CPU CPU，即中央处理器（Central Processing Unit），是计算机的“大脑”，负责处理数据、执行指令和协调硬件运作，是决定设备性能的核心部件。\n \n从功能上看，CPU如同指挥中心：一方面，它读取并执行存储在内存中的程序指令，比如打开软件、计算数据等；另一方面，它统筹协调内存、硬盘、显卡等其他硬件，确保各部件高效配合。无论是简单的文字输入，还是复杂的视频渲染，背后都依赖CPU的运算与控制。\n \nCPU的核心组成包括运算器和控制器。运算器负责算术运算（如加减乘除）和逻辑运算（如比较大小），是数据处理的“加工厂”；控制器则像“指挥官”，负责从内存中取指令、解读指令含义，并调度运算器等部件执行。两者配合，形成“取指令—译码—执行”的循环，不断完成任务。\n\n简言之，CPU是计算机的运算和控制核心，其性能直接影响设备的运行速度和处理能力，是现代电子设备不可或缺的“心脏”。","GPU GPU，即图形处理器（Graphics Processing Unit），是专门负责图像和图形相关运算的硬件，堪称计算机的“视觉中枢”。\n \n早期GPU主要用于处理2D/3D图形渲染，比如电脑游戏中的光影效果、动画帧生成等。其核心优势在于并行计算能力——内部集成了成百上千个小型运算核心，能同时处理大量重复数据，这与CPU侧重复杂逻辑的串行计算形成互补。\n随着技术发展，GPU的应用早已超越图形领域。在人工智能训练、大数据分析、科学计算（如天气预报、分子模拟）等场景中，GPU凭借强大的并行处理能力，可大幅提升运算效率。例如，训练一个复杂的深度学习模型，用GPU可能只需几天，而纯靠CPU可能需要数月。\n \n常见的GPU类型包括：\n- 独显（dGPU）：如NVIDIA的RTX系列、AMD的Radeon系列，性能强劲，适合游戏、专业设计等；\n- 核显（iGPU）：集成在CPU内的显卡，如Intel的Arc系列、AMD的Radeon系列，功耗低，满足日常办公和轻度娱乐。\n \n与CPU相比，GPU的设计更侧重高吞吐量而非低延迟，因此在处理单一复杂任务时效率不如CPU，但面对海量并行任务时优势显著。如今，CPU与GPU协同工作已成为主流计算模式，共同支撑着从日常办公到尖端科研的各类需求。","Memory Memory，即内存，是计算机中用于临时存储数据和程序的硬件，相当于设备的“短期工作台”，负责为CPU（中央处理器）提供即时可访问的信息，是影响设备运行速度的关键部件之一。\n \n内存的核心作用是临时存储：\n- 与硬盘（长期存储设备）不同，内存断电后数据会丢失，但其读写速度远快于硬盘，能让CPU快速调取正在运行的程序（如浏览器、文档）和临时数据，避免频繁从硬盘读取，大幅提升效率。\n- 例如打开视频编辑软件时，软件的核心代码和正在编辑的视频片段会暂时存放在内存中，方便CPU实时处理。\n \nDRAM（动态随机存取存储器）：主流内存类型，如DDR4、DDR5，通过电容存储电荷记录数据，需定期刷新以保持数据，成本较低，容量较大，广泛用于电脑、手机等设备。\n\n内存类型：\n插槽内存：可以轻易升级更换，电气性能较差，空间占用大，成本较低。\n板载内存：无法轻易升级更换，电气性能较好，空间占用少，成本较高。\n\n内存是计算机“存储金字塔”的中间层，连接着高速运算的CPU和低速长期存储的硬盘，其性能直接决定了设备的响应速度和多任务处理能力。","Storage Storage，即存储设备，笔记本电脑有两种主流的长期存储设备，SSD（固态硬盘）和HDD（机械硬盘），负责保存操作系统、软件、文件等数据，即使断电也不会丢失。\n\nHDD（机械硬盘）——HDD是传统存储设备，内部结构类似“小型唱片播放机”：\n- 核心部件包括盘片（金属或玻璃材质，表面涂有磁性材料，数据以磁信号形式存储）、磁头（悬浮在盘片表面，负责读取和写入数据）、电机（驱动盘片高速旋转，通常转速为5400转/分钟或7200转/分钟）。\n- 特点：成本低、容量大、体积大，依赖机械运动，读写速度较慢（通常100-200MB/s），且怕震动、噪音较大、功耗高，\n现已被笔记本市场全面淘汰。\n \nSSD（固态硬盘）——SSD是新型存储设备，基于闪存芯片（类似U盘的存储原理），无机械部件：\n- 数据存储在NAND闪存芯片中，通过控制器管理数据读写，无需物理运动。\n- 特点：读写速度极快，抗震性强、噪音小、功耗低，成本较高，大容量（如4TB以上）价格远高于HDD。"],"optimize":["品牌 官方原装系统\n自带流氓软件\n\n降低性能/弹窗广告\n系统劫持/诱导付费\n隐蔽安装其它流氓软件\n电脑越用越卡\n\n彻底卸载或\n重装纯净系统\n\n如果你偏觉得这些软件好\n或者有非它不用的理由\n那我尊重你的选择 平替软件","Lenovo 联想电脑管家","联想百应","联想应用商店","联想浏览器","联想桌面助手","联想智会","超级互联","联想超级文件","天禧个人智能体（小天）","Ai画师","Ai学习","LenovoModelMgr","CreatorZone","Legion Zone Lenovo Legion Toolkit","联想百应\n（仅限ThinkBook） 在Microsoft Store中\n安装Lenovo Vantage","ASUS 华硕管家","极智浏览器","华硕大厅","A豆大厅","豆丁AI助手","GlideX","小硕知道","Armoury Crate G-Helper","ProArt Creator Hub","HP e管家","惠小微","惠AI应用和开发工具","My HP","惠管家","惠普管家","惠普优享服务","应用商店","McAfee","迈克菲联网顾问","HP","WPS Office","惠无忧","HP Privacy Setting","HP System Information","HP Connection Optimizer","HP PC Hardware Diagnostics","HP Documentation","HP Smart","HP Privacy","HP System Event Utility","Poly Lens","豆包","OMEN Gaming Hub OmenMon","OMEN Super Hub","xiaomi 小爱同学","小米AI创作","小米云服务","应用宝小米电脑版","应用商店","WPS Office","Xiaomi miclaw","HONOR","MECHREVO","ThundeRobot 逗逗游戏伙伴","雷神AI","雷神加速器","雷神软件管家","小悦游戏盒","WPS Office","MACHENIKE 逗逗游戏伙伴","机械师AI","雷神加速器","机械师软件管家","小悦游戏盒","WPS Office","常见流氓软件\n\n不建议安装使用，已安装的建议彻底卸载或重装纯净系统\n\n部分国产流氓软件已与国人日常工作生活高度捆绑，很难完全切割彻底不用\n—— 屎，很多时候都是不得不吃的。","全家桶 安全类 工具类/插件类","2345 腾讯电脑管家 WPS 腾讯ACE反作弊","360 金山毒霸 驱动精灵 P2P下载器","夸克 百度杀毒 鲁大师 Flash中心\n（Flash Player）","百度 金山卫士 ABC看图 驱动人生","腾讯 瑞星杀毒 快压 今日热点","金山 McAfee 好压 小鸟壁纸","搜狗 微软电脑管家 快玩 QQ浏览器","搜狗输入法 猎豹浏览器","暴风影音 海螺壁纸","华军软件 YY浏览器","西西软件盒 小智浏览器","小黑记事本 百度浏览器","爱奇艺 腾讯应用宝","疾风软件市场 压缩大师","腾讯视频 优酷","爱奇艺 QQ音乐","百度网盘 夸克","Edge 雷神加速器","搜狗压缩 驱动总裁","正经装机必备软件","安全类 火绒","浏览器 Chr // ========== Knowledge Search (RAG) ==========
function searchKnowledge(query) {
  const keywords = query.replace(/[\uff0c\u3002\uff1f\uff01\u3001\s]+/g, ' ').split(' ').filter(w => w.length > 1);
  const allTexts = [];

  KB.qa.forEach((item) => {
    const text = item.q + ' ' + item.a;
    let score = 0;
    keywords.forEach(kw => { if (text.includes(kw)) score++; });
    if (score > 0) allTexts.push({ score, text: 'Q: ' + item.q + '\nA: ' + item.a, source: '祛魅科普QA' });
  });

  KB.classification.forEach((item) => {
    let score = 0;
    keywords.forEach(kw => { if (item.includes(kw)) score++; });
    if (score > 0) allTexts.push({ score, text: item, source: '笔电分类' });
  });

  KB.blacklist.forEach((item) => {
    let score = 0;
    keywords.forEach(kw => { if (item.includes(kw)) score++; });
    if (score > 0) allTexts.push({ score, text: item, source: '购机黑名单' });
  });

  KB.hardware.forEach((item) => {
    let score = 0;
    keywords.forEach(kw => { if (item.includes(kw)) score++; });
    if (score > 0) allTexts.push({ score, text: item.substring(0, 800), source: '硬件科普' });
  });

  Object.entries(KB.recommend).forEach(([cat, items]) => {
    items.forEach(item => {
      if (isRecHeader(item)) return;
      let score = 0;
      keywords.forEach(kw => { if (item.includes(kw)) score += 2; });
      if (score > 0) allTexts.push({ score, text: item.substring(0, 600), source: '好评产品-' + cat });
    });
  });

  KB.chip.forEach((item) => {
    let score = 0;
    keywords.forEach(kw => { if (item.includes(kw)) score++; });
    if (score > 0) allTexts.push({ score, text: item.substring(0, 500), source: '芯片概览' });
  });

  KB.optimize.forEach((item) => {
    let score = 0;
    keywords.forEach(kw => { if (item.includes(kw)) score++; });
    if (score > 0) allTexts.push({ score, text: item.substring(0, 500), source: '新机优化' });
  });

  KB.csBasics.forEach((item) => {
    let score = 0;
    keywords.forEach(kw => { if (item.includes(kw)) score++; });
    if (score > 0) allTexts.push({ score, text: item.substring(0, 500), source: '计算机常识' });
  });

  allTexts.sort((a, b) => b.score - a.score);
  const topItems = allTexts.slice(0, 5);

  if (topItems.length === 0) return '';
  let result = '\n\n【相关知识库内容】\n';
  topItems.forEach((item) => {
    result += '---\n来源: ' + item.source + '\n' + item.text + '\n';
  });
  return result;
}

// ========== Markdown Renderer ==========
function getImgUrl(id) {
  return IMG_MAP[id] || '';
}
function renderMD(text) {
  // Replace [img:ID_xxx] with actual image tags
  text = text.replace(/\[img:(ID_[^\]]+)\]/g, function(match, id) {
    const src = IMG_MAP[id];
    if (src) return '<img src="' + src + '" style="max-width:300px;border-radius:8px;margin:8px 0;display:block" loading="lazy">';
    return match;
  });
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^- (.+)$/gm, '<span style="display:block;padding-left:16px">\u2022 $1</span>')
    .replace(/^\d+\. (.+)$/gm, '<span style="display:block;padding-left:16px">$&</span>')
    .replace(/\n/g, '<br>');
}

// 聊天输入框拖拽调整高度
(function() {
  const bottomHandle = document.getElementById('chatResizeHandle');
  const topHandle = document.getElementById('chatResizeTop');
  const input = document.getElementById('chatInput');
  if (!bottomHandle || !input) return;
  const MIN_H = 42, MAX_H = window.innerHeight * 0.5;

  function initDrag(handle, reverse) {
    let dragging = false, startY = 0, startH = 0;
    function onDown(e) {
      dragging = true;
      startY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
      startH = input.offsetHeight;
      handle.classList.add('active');
      e.preventDefault();
    }
    function onMove(e) {
      if (!dragging) return;
      const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
      const delta = reverse ? (startY - clientY) : (clientY - startY);
      const newH = Math.max(MIN_H, Math.min(MAX_H, startH + delta));
      input.style.height = newH + 'px';
    }
    function onUp() {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('active');
    }
    handle.addEventListener('mousedown', onDown);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    handle.addEventListener('touchstart', onDown, {passive: false});
    document.addEventListener('touchmove', onMove);
    document.addEventListener('touchend', onUp);
  }

  // 底部拖拽条：向下拖 = 增大
  initDrag(bottomHandle, false);
  // 顶部拖拽条：向上拖 = 增大（方向相反）
  if (topHandle) initDrag(topHandle, true);
})();

function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || isStreaming) return;

  // API Key 已内置，用户无需填写

  const welcome = document.getElementById('chatWelcome');
  if (welcome) welcome.style.display = 'none';
  document.getElementById('chatToolbar').style.display = 'block';

  appendMsg('user', msg);
  input.value = '';
  input.style.height = 'auto';
  chatHistory.push({ role: 'user', content: msg });

  const knowledge = searchKnowledge(msg);
  const fullMsg = msg + knowledge;

  isStreaming = true;
  document.getElementById('sendBtn').textContent = '思考中...';
  const msgEl = appendMsg('ai', '');

  const messages = [
    { role: 'system', content: SYSTEM_PROMPT },
    ...chatHistory.slice(-10)
  ];
  messages[messages.length - 1] = { role: 'user', content: fullMsg };

  // 内置 API Key，用户无需填写
  const BUILTIN_KEY = 'sk-fda87e7a58834d358ffb0433fa69b50c';
  const API_URL = 'https://api.deepseek.com/chat/completions';

  // 带超时的 fetch
  const ctrl = new AbortController();
  const timeout = setTimeout(() => ctrl.abort(), 15000);

  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + BUILTIN_KEY },
    body: JSON.stringify({
      model: 'deepseek-chat', messages, stream: true,
      temperature: 0.7, max_tokens: 2048
    }),
    signal: ctrl.signal
  }).then(async resp => {
    clearTimeout(timeout);
    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(resp.status + ': ' + err);
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta?.content || '';
            fullText += delta;
            msgEl.querySelector('.msg-bubble').innerHTML = renderMD(fullText);
            scrollChat();
          } catch(e) {}
        }
      }
    }
    chatHistory.push({ role: 'assistant', content: fullText });
    saveChatHistory();
  }).catch(err => {
    clearTimeout(timeout);
    let hint = err.message;
    if (err.name === 'AbortError') {
      hint = '请求超时（15秒），请检查网络连接后重试。';
    } else if (err.message.includes('Failed to fetch')) {
      hint = '网络连接失败，请检查网络后重试。<br>提示：此功能需要联网，请确保网络通畅。';
    } else if (err.message.includes('429')) {
      hint = '请求太频繁，请稍后再试。每人每分钟最多 20 次，每天最多 200 次。';
    }
    msgEl.querySelector('.msg-bubble').innerHTML = '<span style="color:var(--red)">&#x274C; ' + hint + '</span>';
  }).finally(() => {
    isStreaming = false;
    document.getElementById('sendBtn').textContent = '发送';
  });
}

function appendMsg(role, content) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg msg-' + (role === 'user' ? 'user' : 'ai');
  div.innerHTML = `
    <div class="msg-avatar">${role === 'user' ? '\u{1F60E}' : '\u7B14'}</div>
    <div class="msg-bubble">${role === 'user' ? escapeHtml(content) : (content ? renderMD(content) : '<div class="typing-dots"><span></span><span></span><span></span></div>')}</div>
  `;
  container.appendChild(div);
  scrollChat();
  return div;
}

      html += '<div class="kb-nav-group" data-group="' + s.group + '" onclick="toggleKBNavGroup(this)">' + s.group + '</div>';
      lastGroup = s.group;
    }
    html += '<div class="kb-nav-item' + (s.id === currentKBSection ? ' active' : '') + '" data-kb="' + s.id + '" data-group="' + s.group + '" onclick="showKBSection(\'' + s.id + '\')">' + s.icon + ' ' + s.name + '</div>';
  });
  document.getElementById('kbNav').innerHTML = html;
  showKBSection('qa');
}

function toggleKBNavGroup(groupEl) {
  groupEl.classList.toggle('collapsed');
  const group = groupEl.dataset.group;
  let next = groupEl.nextElementSibling;
  // 只遍历紧跟在该 group 标题后面的同组子项，遇到下一个 group 标题就停
  while (next && next.classList.contains('kb-nav-item') && next.dataset.group === group) {
    next.style.display = groupEl.classList.contains('collapsed') ? 'none' : '';
    next = next.nextElementSibling;
  }
}

// 判断推荐条目是否为表头/图例/说明行（非机型数据）
function isRecHeader(text) {
  var firstLine = text.split('\n')[0].trim();
  if (firstLine.length < 4) return true;
  // 价格区间标题行
  if (/^\d+[kK]/.test(firstLine) && text.includes('价位')) return true;
  // 表头行关键词
  var headerKws = ['产品外观','参考价位','品牌','型号','海外命名','才是笔记本','真实型号',
    '屏幕','尺寸','厚度','不含脚垫','重量','不含电源','素质','同价格区间',
    'Display','CPU','iGPU','Memory','Storage','Battery','电池大','懒人链接',
    '紫色加粗','蓝色加粗','红色加粗','黑色加粗','优 均','优（'];
  if (headerKws.some(function(k){ return text.includes(k); })) return true;
  // 分类标题行（如 "—— 甜品砖头（*070Ti） 2026.05.08 ..."）
  if (/^—+/.test(firstLine)) return true;
  // 纯图例行
  if (firstLine === '优 均（包含优劣） 劣') return true;
  // 非机型文本：预算建议、导航提示、占位符、单字碎片
  if (/^(预算|预留|暂无|无优秀|从这|双$)/.test(firstLine)) return true;
  // GPU规格碎片（首行只有GPU名称如 RTX/GTX/RX，后续仅有显存型号数字）
  if (/^(RTX|GTX|RX)\s*$/.test(firstLine)) return true;
  // 行内注释（如 "14 注 风扇噪音大"）
  if (/^\d+\s+注\s/.test(firstLine)) return true;
  return false;
}

// 解析推荐机型条目：提取品牌型号、子型号、评分、优缺点摘要
function parseRecItem(text) {
  var lines = text.split('\n').map(function(l){ return l.trim(); }).filter(function(l){ return l; });
  var modelName = lines[0] || '';

  // 从前几行中提取子型号、综合评分、评语
  var subModel = '', rating = '', tagline = '';
  var scanText = lines.slice(1).join(' ');

  // 提取综合评分（优/良+/良/及格/差，可能带-如优-）
  var rm = scanText.match(/\s+(优-?|良\+?|及格|差)\s/);
  if (rm) rating = rm[1];

  // 提取子型号（第二行中，尺寸/评语之前的文本）
  if (lines.length > 1) {
    var l2 = lines[1];
    // A: "锐龙版 16 27 2.53 优 ..."
    var mA = l2.match(/^(.+?)\s+\d{2}\s+(\d{2}\.)?\d/);
    // B: "（水冷模组） 28.1 2.7 ..."
    var mB = l2.match(/^([（(][^）)]+[）)])\s+\d/);
    // C: "2025（白） 阉割USB4 ..."（到评语关键词前）
    var mC = l2.match(/^(.+?)\s+(阉割|标配|键盘面|风扇|全金属|性能释放|酷睿|锐龙|天猫|PDD|内存)/);
    // D: "酷睿Ultra版 2.5 天猫/抖音"
    var mD = l2.match(/^(.+?)\s+\d+\.\d+\s+(天猫|PDD)/);

    if (mA && !/^\d/.test(mA[1]) && mA[1].length > 1) subModel = mA[1].trim();
    else if (mB) subModel = mB[1].trim();
    else if (mC && !/^\d/.test(mC[1])) subModel = mC[1].trim();
    else if (mD) subModel = mD[1].trim();
    // 如果第二行只有"2025"这种纯数字，跳过
    else if (/^\d{4}$/.test(l2)) subModel = '';
  }

  // 从后续行提取评语（跳过纯参数行）
  var comments = [];
  for (var ci = 1; ci < Math.min(10, lines.length); ci++) {
    var cl = lines[ci];
    // 跳过参数行
    if (/^\d{2}\s+(\d{2}\.)?\d\s+\d+\.\d+/.test(cl)) continue;
    if (/^\d{4}$/.test(cl)) continue;
    if (/^[（(][^）)]*[）)]$/.test(cl) && cl.length < 10) continue;
    if (/^(天猫|抖音|PDD|京东)/.test(cl)) continue;
    if (/^(标配\d+G|标配\d+T)/.test(cl)) continue;
    if (/^(LCD|OLED)/.test(cl) && cl.length < 10) continue;
    if (/^\d+%?\s*(sRGB|DCI|AdobeRGB)/.test(cl)) continue;
    if (/^\d+Hz$/.test(cl)) continue;
    if (/^\d+nits$/.test(cl)) continue;
    if (/^\d+\s*x\s*\d+$/.test(cl)) continue;
    if (/^(DDR|LPDDR|NVMe|QLC|TLC|SSD)/.test(cl)) continue;
    if (/^(双内存槽|双\s*2280|单\s*2280|2280)\s*$/.test(cl)) continue;
    if (/^(RTX|GTX|RX)\s+\d{3,4}/.test(cl) && cl.length < 15) continue;
    if (/^(锐龙|R\d|酷睿|i\d|全大核|AMD|Intel)\s*$/.test(cl)) continue;
    if (/^\d{3,4}\s*$/.test(cl)) continue;
    if (/^(16G|32G|64G|1TB|2TB|512G|8G|12G|24G|6G|4G)\s*$/.test(cl)) continue;
    // 去除行内尺寸参数、年份、×标记、纯规格碎片
    cl = cl.replace(/\d{2}\s+(\d{2}\.)?\d\s+\d+\.\d+/g, '').trim();
    cl = cl.replace(/\d{4}\s*年?/g, '').trim();
    cl = cl.replace(/\s*×\s*$/g, '').trim();
    // 去除行尾的纯规格后缀（如 "500nits LCD"、"锐龙 R7"、"锐龙 R9"等）
    cl = cl.replace(/\s*\d+nits\s*(LCD|OLED)?$/i, '').trim();
    cl = cl.replace(/\s*锐龙\s*R\d+\s*$/i, '').trim();
    cl = cl.replace(/\s*酷睿\s*U?\d+.*$/i, '').trim();
    cl = cl.replace(/\s*Radeon\s*.*$/i, '').trim();
    cl = cl.replace(/\s*(HX|HS|U)\s*$/i, '').trim();
    // 去除行首残留的尺寸数字（如 "16 27 2.53"）
    cl = cl.replace(/^\d{2}\s+(\d{2}\.)?\d\s+\d+\.\d+\s*/g, '').trim();
    // 去除行首的纯评分（如 "优 性能释放优秀" 中 "优" 是多余的，因为已有 rating badge）
    cl = cl.replace(/^(优-?|良\+?)\s+/g, '').trim();
    // 去除开头的子型号残留（如 "锐龙版 16 27 2.53 优" 中子型号和参数已移除，但可能残留）
    if (ci === 1 && subModel && cl.indexOf(subModel) === 0) {
      cl = cl.substring(subModel.length).trim();
    }
    if (cl.length >= 2) comments.push(cl);
    if (comments.length >= 5) break;
  }
  tagline = comments.join(' | ');

  return {
    modelName: modelName,
    subModel: subModel,
    rating: rating,
    tagline: tagline,
    fullText: text
  };
}

        if (curTable) curTable.rows.push(item);
      });

var _searchTimer = null;
function debouncedSearchKB(query) {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(function(){ searchKB(query); }, 280);
}

function searchKB(query) {
  if (!query.trim()) { showKBSection(currentKBSection); return; }
  const keywords = query.toLowerCase().split(/\s+/);
  const display = document.getElementById('kbDisplay');

  let results = [];

  KB.qa.forEach(item => {
    const text = (item.q + ' ' + item.a).toLowerCase();
    const score = keywords.filter(k => text.includes(k)).length;
    if (score > 0) results.push({ score, q: item.q, a: item.a, img: item.img, source: '祛魅科普' });
  });

  KB.blacklist.forEach(item => {
    const text = item.toLowerCase();
    const score = keywords.filter(k => text.includes(k)).length;
    if (score > 0) {
      const firstLine = item.split('\n')[0].trim();
      results.push({ score, q: firstLine || '黑名单', a: item, source: '购机黑名单' });
    }
  });

  KB.classification.forEach(item => {
    const text = item.toLowerCase();
    const score = keywords.filter(k => text.includes(k)).length;
    if (score > 0) results.push({ score, q: '笔电分类', a: item, source: '笔电分类' });
  });

  KB.hardware.forEach(item => {
    const text = item.toLowerCase();
    const score = keywords.filter(k => text.includes(k)).length;
    if (score > 0) results.push({ score, q: '硬件科普', a: item.substring(0, 500), source: '硬件科普' });
  });

  Object.entries(KB.recommend).forEach(([cat, items]) => {
    items.forEach(item => {
      if (isRecHeader(item)) return;
      const text = item.toLowerCase();
      const score = keywords.filter(k => text.includes(k)).length * 2;
      if (score > 0) {
        const parsed = parseRecItem(item);
        results.push({ score, q: parsed.modelName, parsed: parsed, source: '好评产品', cat: cat });
      }
    });
  });

  results.sort((a, b) => b.score - a.score);
  results = results.slice(0, 30);

  let html = '<div class="kb-section-title">搜索结果（找到 ' + results.length + ' 条）</div>';
  if (results.length === 0) {
    html += '<div class="empty-state">没有找到相关内容</div>';
  } else {
    results.forEach(r => {
      const hl = (text) => {
        let result = escapeHtml(text);
        keywords.forEach(kw => {
          if (kw.length > 1) {
            try {
              var safeKw = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              result = result.replace(new RegExp(safeKw, 'gi'), '<span class="highlight">$&</span>');
            } catch(e) {}
          }
        });
        return result;
      };
      html += '<div class="qa-card' + (r.parsed ? ' rec-card' : '') + '">';
      if (r.img && IMG_MAP[r.img]) {
        html += '<img src="' + IMG_MAP[r.img] + '" style="max-width:200px;border-radius:8px;margin-bottom:12px;display:block" loading="lazy">';
      }
      if (r.parsed) {
        // 推荐机型：结构化展示
        var p = r.parsed;
        var rc3 = p.rating === '优' ? '#10b981' : p.rating === '良+' ? '#10b981' :
                  p.rating === '良' ? '#f59e0b' : p.rating === '及格' ? '#f97316' : '#ef4444';
        html += '<div class="qa-q rec-model-name">' + hl(p.modelName) + ' <span class="tag" style="background:var(--bg3);color:var(--text3)">' + r.source + (r.cat ? '-' + r.cat : '') + '</span>';
        if (p.rating) html += ' <span style="padding:1px 6px;border-radius:4px;font-size:11px;background:' + rc3 + '22;color:' + rc3 + '">' + p.rating + '</span>';
        html += '</div>';
        if (p.tagline) html += '<div class="qa-a" style="color:var(--text2);font-size:13px">' + hl(p.tagline) + '</div>';
      } else {
        html += '<div class="qa-q">' + hl(r.q) + ' <span class="tag" style="background:var(--bg3);color:var(--text3)">' + r.source + '</span></div>';
        html += '<div class="qa-a">' + hl(r.a) + '</div>';
      }
      html += '</div>';
    });
  }
  display.innerHTML = html;
  // 搜索结果入场动画
  display.querySelectorAll('.qa-card').forEach((el, i) => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(12px)';
    setTimeout(() => {
      el.style.transition = 'opacity .35s ease, transform .35s cubic-bezier(.16,1,.3,1)';
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    }, i * 50);
  });
}

function initTest() {
  testStep = 0;
  testAnswers = {};
  renderTestStep();
}

function renderTestStep() {
  const container = document.getElementById('testContainer');

  if (testStep >= TEST_STEPS.length) { renderTestResult(); return; }

  const step = TEST_STEPS[testStep];
  let html = '<div class="test-progress">';
  TEST_STEPS.forEach((s, i) => {
    const cls = i < testStep ? 'done' : (i === testStep ? 'current' : '');
    html += '<div class="test-step ' + cls + '"><div class="test-step-num">' + (i+1) + '</div></div>';
  });
  html += '</div>';

  html += '<div class="test-form"><h3>' + step.title + '</h3>';
  step.fields.forEach(f => {
    html += '<div class="test-group"><label class="test-label">' + f.label + '</label>';
    if (f.type === 'select') {
      html += '<div class="test-options">';
      f.options.forEach(opt => {
        const sel = testAnswers[f.id] === opt ? ' selected' : '';
        html += '<div class="test-option' + sel + '" data-fid="' + f.id + '" onclick="selectTestOpt(this,\'' + f.id + '\',\'single\')">' + opt + '</div>';
      });
      html += '</div>';
    } else if (f.type === 'multi') {
      html += '<div class="test-options">';
      const selected = testAnswers[f.id] || [];
      f.options.forEach(opt => {
        const sel = selected.includes(opt) ? ' selected' : '';
        html += '<div class="test-option' + sel + '" data-fid="' + f.id + '" onclick="selectTestOpt(this,\'' + f.id + '\',\'multi\')">' + opt + '</div>';
      });
      html += '</div>';
    } else if (f.type === 'text') {
      html += '<input class="test-input" value="' + (testAnswers[f.id]||'') + '" onchange="testAnswers[\'' + f.id + '\']=this.value">';
    } else if (f.type === 'textarea') {
      html += '<textarea class="test-textarea" onchange="testAnswers[\'' + f.id + '\']=this.value">' + (testAnswers[f.id]||'') + '</textarea>';
    } else if (f.type === 'range') {
      const val = testAnswers[f.id] || f.default;
      html += '<div class="test-range-val" id="budgetVal">' + val + ' 元</div>';
      html += '<input class="test-range" type="range" min="' + f.min + '" max="' + f.max + '" step="' + f.step + '" value="' + val + '" oninput="testAnswers[\'' + f.id + '\']=Number(this.value);document.getElementById(\'budgetVal\').textContent=this.value+\' 元\'">';
    }
    html += '</div>';
  });

  html += '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">';
  if (testStep > 0) html += '<button class="btn btn-outline" onclick="testStep--;renderTestStep()">上一步</button>';
  html += '<button class="btn btn-accent" onclick="testStep++;renderTestStep()">' + (testStep === TEST_STEPS.length - 1 ? '查看结果' : '下一步') + '</button>';
  html += '</div></div>';

  container.innerHTML = html;
}

function selectTestOpt(el, fid, mode) {
  if (mode === 'single') {
    testAnswers[fid] = el.textContent;
    el.parentElement.querySelectorAll('.test-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
  } else {
    if (!testAnswers[fid]) testAnswers[fid] = [];
    const val = el.textContent;
    const idx = testAnswers[fid].indexOf(val);
    if (idx >= 0) { testAnswers[fid].splice(idx, 1); el.classList.remove('selected'); }
    else { testAnswers[fid].push(val); el.classList.add('selected'); }
  }
}

function renderTestResult() {
  const container = document.getElementById('testContainer');
  const usage = testAnswers.usage || [];
  const budget = testAnswers.budget || 5000;
  const portable = testAnswers.portable || '基本不带';

  let type = '\u6838\u663e\u672c';
  let reasons = [];

  if (usage.includes('AI/大模型本地部署')) {
    type = budget >= 9000 ? '甜品砖头' : '主流砖头';
    reasons.push('AI模型本地部署需要大量内存和独显');
  }
  if (usage.includes('专业软件(设计/建模/渲染)')) {
    type = '各类砖头';
    reasons.push('专业设计/建模/渲染软件需要独显和高性能CPU');
  }
  if (usage.includes('游戏娱乐')) {
    const games = (testAnswers.games || '').toLowerCase();
    if (games.includes('原神') || games.includes('吃鸡') || games.includes('pubg') || games.includes('永劫') || games.includes('瓦') || games.includes('lol')) {
      type = '主流砖头';
      reasons.push('这些游戏需要独显和中高配置');
    } else if (games.includes('3a') || games.includes('大表哥') || games.includes('赛博') || games.includes('荒野')) {
      type = budget >= 9000 ? '甜品砖头' : '主流砖头';
      reasons.push('大型3A游戏需要中高配独显');
    } else {
      type = '主流砖头';
      reasons.push('游戏需求建议搭配独显');
    }
  }
  if (usage.includes('编程开发')) {
    const sw = (testAnswers.software || '').toLowerCase();
    if (sw.includes('android') || sw.includes('flutter')) {
      if (type === '核显本') type = '主流砖头';
      reasons.push('部分开发场景需要独显加速');
    } else {
      reasons.push('编程开发主要吃内存，建议24G起步');
    }
  }

  if (portable === '需要，经常带' && !usage.includes('游戏娱乐') && !usage.includes('专业软件(设计/建模/渲染)')) {
    type = '核显本';
    reasons.push('需要经常携带，建议轻薄核显本');
  }

  if (reasons.length === 0) {
    reasons.push('根据你的需求，核显本即可满足日常使用');
  }

  let budgetNote = '';
  if (type === '核显本' && budget > 7000) budgetNote = '核显本一般3000-6000即可，你可以省下预算或考虑小钢炮';
  if ((type === '主流砖头' || type === '各类砖头') && budget < 5000) budgetNote = '你的预算可能偏低，建议适当提高或降低性能预期';
  if (type === '甜品砖头' && budget < 8000) budgetNote = '甜品砖头一般9000起步，预算可能不够';

  let recType = '核显本';
  if (type.includes('砖头') && budget < 8000) recType = '主流砖头';
  else if (type.includes('砖头') && budget < 14000) recType = '甜品砖头';
  else if (type.includes('砖头') && budget >= 14000) recType = '高端砖头';
  else if (type === '各类砖头') recType = '主流砖头';

  var recTypeDesc = {
    '核显本': '无独显，靠CPU核芯显卡运行，适合日常办公/学习，续航好',
    '小钢炮': '轻薄机身+独显，便携与性能兼顾',
    '轻薄砖头': '独显轻薄本，比小钢炮厚一点但屏幕大性能强',
    '主流砖头': 'RTX 4060/5060 级游戏本，主流游戏/创作需求通吃',
    '甜品砖头': 'RTX 4070/5070 级游戏本，2K高画质畅玩大型游戏',
    '高端砖头': 'RTX 4080/5080 以上旗舰游戏本，极致性能'
  };

  const recs = KB.recommend[recType] || [];
  // 过滤表头/非机型条目
  const allRecs = recs.filter(function(r){ return !isRecHeader(r); }).map(function(r){ return parseRecItem(r); });
  const showCount = 5;
  const hasMore = allRecs.length > showCount;

  let html = '<div class="test-progress">';
  TEST_STEPS.forEach((s, i) => { html += '<div class="test-step done"><div class="test-step-num">' + (i+1) + '</div></div>'; });
  html += '</div>';

  html += '<div class="test-result">';
  html += '<div style="text-align:center;margin-bottom:24px"><div style="font-size:48px;margin-bottom:8px">&#x1F3AF;</div></div>';
  html += '<div class="result-type">推荐类型：' + escapeHtml(type) + '</div>';
  if (recTypeDesc[recType]) {
    html += '<div style="text-align:center;font-size:13px;color:var(--text2);margin-top:-12px;margin-bottom:16px">' + escapeHtml(recTypeDesc[recType]) + '</div>';
  }
  html += '<div class="result-reason">';
  reasons.forEach(r => { html += '<p>&#x2022; ' + r + '</p>'; });
  if (budgetNote) html += '<p style="color:var(--orange);margin-top:8px">' + budgetNote + '</p>';
  html += '</div>';

  if (allRecs.length > 0) {
    html += '<div class="kb-section-title">参考好评产品（共 ' + allRecs.length + ' 款）</div>';
    html += '<div class="result-laptops" id="recList">';
    allRecs.forEach(function(r, i) {
      var hidden = (i >= showCount) ? ' style="display:none"' : '';
      html += '<div class="result-laptop"' + hidden + '>';
      html += '<div style="display:flex;align-items:center;gap:8px">';
      html += '<h4 style="margin:0;flex:1">' + escapeHtml(r.modelName) + '</h4>';
      if (r.rating) {
        var rc2 = r.rating === '优' ? '#10b981' : r.rating === '良+' ? '#10b981' :
                  r.rating === '良' ? '#f59e0b' : r.rating === '及格' ? '#f97316' : '#ef4444';
        html += '<span style="padding:2px 8px;border-radius:6px;font-size:12px;font-weight:700;background:' + rc2 + '22;color:' + rc2 + '">' + escapeHtml(r.rating) + '</span>';

      html += '</div>';

      html += '</div>';

    html += '</div>';

      html += '<div style="text-align:center;margin-top:12px">';

      html += '</div>';
    }
  }

  html += '<div style="text-align:center;margin-top:24px">';
  html += '<button class="btn btn-blue" onclick="goToChat()">&#x1F4AC; 去 AI 对话详细咨询</button> ';
  html += '<button class="btn btn-outline" onclick="testStep=0;testAnswers={};renderTestStep()">&#x1F504; 重新测试</button>';
  html += '</div></div>';

  container.innerHTML = html;
}

var _recsExpanded = false;
function toggleRecList() {
  _recsExpanded = !_recsExpanded;

    html += '<div class="card" style="padding:0;overflow:hidden">';
    SOFTWARE_LIST.forEach(sw => {
      html += '<div class="software-item"><div><div class="sw-name">' + sw.name + '</div><div class="sw-desc">' + sw.desc + '</div></div></div>';
    });
    html += '</div>';
    html += '<div class="card card-accent" style="margin-top:16px"><p style="color:var(--text2);font-size:13px">建议：从官网或Microsoft Store下载软件，不要用第三方软件管家安装，避免捆绑安装流氓软件。</p></div>';
  }

  content.innerHTML = html;
}

// ========== 动态计算 header/tabs 高度，更新 CSS 变量 ==========
function updateLayoutVars() {
  const header = document.querySelector('.header');
  const tabs = document.querySelector('.tabs');
  if (header && tabs) {
    const hh = header.offsetHeight;
    const th = tabs.offsetHeight;
    document.documentElement.style.setProperty('--header-h', hh + 'px');
    document.documentElement.style.setProperty('--tabs-h', th + 'px');
  }
}
updateLayoutVars();
window.addEventListener('resize', updateLayoutVars);
window.addEventListener('load', updateLayoutVars);

// ========== PWA Service Worker ==========
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  });
}
</script>
</body>
</html>
